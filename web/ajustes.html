<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajustes — Cobrador</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><h1>Cobrador de<br>Facturas</h1><span>v2.0 web</span></div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="/">           <span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="/cartera">    <span class="nav-icon">📊</span> Cartera</a>
    <a class="nav-item" href="/pdfs">       <span class="nav-icon">📄</span> PDFs / RIDEs</a>
    <a class="nav-item" href="/plantillas"> <span class="nav-icon">📝</span> Plantillas</a>
    <a class="nav-item" href="/contifico">  <span class="nav-icon">🔄</span> Contifico</a>
    <a class="nav-item" href="/ajustes">    <span class="nav-icon">⚙️</span> Ajustes</a>
  </nav>
  <div class="sidebar-footer"><span style="font-size:11px; color:var(--muted);"><span class="status-dot"></span> Servidor activo</span></div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">Ajustes</span>
    <div class="topbar-right">
      <button class="btn btn-primary" id="btn-guardar">Guardar todo</button>
    </div>
  </div>
  <div class="content" style="max-width:700px;">

    <!-- Correo electronico -->
    <div class="section">
      <div class="section-header"><span>✉ Correo electronico</span><span class="arrow">▾</span></div>
      <div class="section-body">
        <div class="form-group"><label>Proveedor</label>
          <select id="email-proveedor">
            <option value="gmail">Gmail</option>
            <option value="hotmail">Hotmail / Outlook</option>
            <option value="yahoo">Yahoo</option>
          </select>
        </div>
        <div class="form-group"><label>Email remitente</label><input type="email" id="email-usuario"></div>
        <div class="form-group"><label>Contrasena de aplicacion</label><input type="password" id="email-password" placeholder="xxxx xxxx xxxx xxxx"></div>
        <div class="form-group"><label>Nombre del remitente</label><input type="text" id="email-nombre"></div>
      </div>
    </div>

    <!-- WhatsApp -->
    <div class="section">
      <div class="section-header"><span>💬 WhatsApp</span><span class="arrow">▾</span></div>
      <div class="section-body">
        <div class="form-group"><label>Numero de WhatsApp (con codigo de pais)</label><input type="text" id="wa-numero" placeholder="593987654321"></div>
        <p style="font-size:12px; color:var(--muted);">Se usa para abrir chats via wa.me. No requiere API de pago.</p>
      </div>
    </div>

    <!-- Remitente / empresa -->
    <div class="section">
      <div class="section-header"><span>🏢 Datos del remitente</span><span class="arrow">▾</span></div>
      <div class="section-body">
        <div class="form-group"><label>Nombre de la empresa</label><input type="text" id="rem-empresa"></div>
        <div class="form-group"><label>RUC</label><input type="text" id="rem-ruc"></div>
        <div class="form-group"><label>Telefono empresa</label><input type="text" id="rem-telefono"></div>
      </div>
    </div>

    <!-- Datos bancarios -->
    <div class="section">
      <div class="section-header"><span>🏦 Datos bancarios</span><span class="arrow">▾</span></div>
      <div class="section-body">
        <div class="form-group"><label>Banco</label><input type="text" id="banco-nombre"></div>
        <div class="form-group"><label>Tipo de cuenta</label>
          <select id="banco-tipo">
            <option value="Ahorros">Ahorros</option>
            <option value="Corriente">Corriente</option>
          </select>
        </div>
        <div class="form-group"><label>Numero de cuenta</label><input type="text" id="banco-cuenta"></div>
        <div class="form-group"><label>Nombre del titular</label><input type="text" id="banco-titular"></div>
        <div class="form-group"><label>CI / RUC del titular</label><input type="text" id="banco-ci"></div>
      </div>
    </div>

    <!-- Contifico API -->
    <div class="section">
      <div class="section-header"><span>🔄 Contifico API</span><span class="arrow">▾</span></div>
      <div class="section-body">
        <div class="form-group"><label>Token de API</label><input type="password" id="contifico-token" placeholder="Token de autenticacion Contifico"></div>
        <div class="form-group"><label>RUC de la empresa en Contifico</label><input type="text" id="contifico-ruc"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script>
// Mapa: campo_html -> ruta en config JSON (claves exactas de ConfigManager)
const CAMPOS = {
  "email-proveedor":  ["email",     "provider"],
  "email-usuario":    ["email",     "address"],
  "email-nombre":     ["remitente", "nombre"],
  "wa-numero":        ["whatsapp",  "mi_telefono"],
  "rem-empresa":      ["remitente", "empresa"],
  "rem-cargo":        ["remitente", "cargo"],
  "banco-nombre":     ["banco",     "nombre"],
  "banco-tipo":       ["banco",     "tipo"],
  "banco-cuenta":     ["banco",     "numero"],
  "banco-titular":    ["banco",     "titular"],
  "banco-ci":         ["banco",     "ci"],
  "contifico-token":  ["contifico", "api_token"],
};

async function cargarConfig() {
  try {
    const cfg = await get("/api/config");
    Object.entries(CAMPOS).forEach(([id, [sec, key]]) => {
      const el = document.getElementById(id);
      if (el && cfg[sec]?.[key] !== undefined) el.value = cfg[sec][key];
    });
  } catch {}
}

document.getElementById("btn-guardar").addEventListener("click", async () => {
  const cfg = {};
  Object.entries(CAMPOS).forEach(([id, [sec, key]]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!cfg[sec]) cfg[sec] = {};
    cfg[sec][key] = el.value;
  });
  // La contrasena se incluye solo si el usuario escribio algo
  const pwd = document.getElementById("email-password").value;
  if (pwd) {
    if (!cfg["email"]) cfg["email"] = {};
    cfg["email"]["password"] = pwd;
  }
  try {
    await post("/api/config", cfg);
    toast("Configuracion guardada", "success");
  } catch (err) {
    toast("Error: " + err.message, "error");
  }
});

// Secciones colapsables
document.querySelectorAll(".section-header").forEach(header => {
  // Primera seccion abierta por defecto, el resto cerradas
  const body = header.nextElementSibling;
  const arrow = header.querySelector(".arrow");
  if (header !== document.querySelector(".section-header")) {
    body.classList.add("hidden");
    if (arrow) arrow.textContent = "▸";
  }
  header.addEventListener("click", () => {
    body.classList.toggle("hidden");
    if (arrow) arrow.textContent = body.classList.contains("hidden") ? "▸" : "▾";
  });
});

cargarConfig();
</script>
</body>
</html>
