<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFs / RIDEs — Cobrador</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><h1>Cobrador de<br>Facturas</h1><span>v2.0 web</span></div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="/">           <span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item" href="/cartera">    <span class="nav-icon">📊</span> Cartera</a>
    <a class="nav-item" href="/pdfs">       <span class="nav-icon">📄</span> PDFs / RIDEs</a>
    <a class="nav-item" href="/plantillas"> <span class="nav-icon">📝</span> Plantillas</a>
    <a class="nav-item" href="/contifico">  <span class="nav-icon">🔄</span> Contifico</a>
    <a class="nav-item" href="/ajustes">    <span class="nav-icon">⚙️</span> Ajustes</a>
  </nav>
  <div class="sidebar-footer"><span style="font-size:11px; color:var(--muted);"><span class="status-dot"></span> Servidor activo</span></div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">PDFs / RIDEs</span>
  </div>
  <div class="content">

    <!-- Drop zone -->
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📄</div>
      <h3 style="color:var(--subtle); margin-bottom:8px;">Arrastra RIDEs aqui</h3>
      <p style="margin-bottom:16px;">o haz clic para seleccionar archivos PDF</p>
      <label class="btn btn-primary" for="pdf-input">Seleccionar PDFs</label>
      <input type="file" id="pdf-input" accept=".pdf" multiple style="display:none">
    </div>

    <!-- Resultado de extraccion -->
    <div id="resultado" style="display:none; margin-top:20px;">
      <div class="section">
        <div class="section-header">
          <span id="res-titulo">Datos extraidos</span>
          <span class="arrow">▾</span>
        </div>
        <div class="section-body">
          <div class="cards-grid" style="margin-bottom:16px;">
            <div class="card"><div class="card-label">Cliente</div><div id="res-cliente" style="font-weight:600; color:var(--text);"></div></div>
            <div class="card"><div class="card-label">Factura</div><div id="res-factura" style="font-weight:600; color:var(--text);"></div></div>
            <div class="card"><div class="card-label">Total</div><div class="card-value pine" id="res-total"></div></div>
          </div>
          <div class="form-group">
            <label>Mensaje</label>
            <textarea id="res-mensaje" rows="6"></textarea>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-secondary" onclick="copiarResultado()">📋 Copiar</button>
            <button class="btn btn-whatsapp"  onclick="whatsappResultado()">💬 WhatsApp</button>
            <button class="btn btn-primary"   onclick="emailResultado()">📧 Email</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script>
let _datos = null;

const dropZone = document.getElementById("drop-zone");

dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
dropZone.addEventListener("drop", async e => {
  e.preventDefault();
  dropZone.classList.remove("drag-over");
  const files = [...e.dataTransfer.files].filter(f => f.name.endsWith(".pdf"));
  if (files.length) procesarPDF(files[0]);
});

document.getElementById("pdf-input").addEventListener("change", e => {
  if (e.target.files[0]) procesarPDF(e.target.files[0]);
  e.target.value = "";
});

async function procesarPDF(file) {
  const form = new FormData();
  form.append("archivo", file);
  toast("Extrayendo datos del PDF...", "info");
  try {
    const res = await fetch("/api/pdfs/extraer", { method: "POST", body: form });
    if (!res.ok) throw new Error((await res.json()).detail);
    _datos = await res.json();

    document.getElementById("res-titulo").textContent   = file.name;
    document.getElementById("res-cliente").textContent  = _datos.cliente || "—";
    document.getElementById("res-factura").textContent  = _datos.numero  || "—";
    document.getElementById("res-total").textContent    = fmt$(_datos.total ?? 0);
    document.getElementById("res-mensaje").value        = _datos.mensaje  || "";
    document.getElementById("resultado").style.display  = "";
    initSections(false);  // todas las secciones abiertas al mostrar resultado
    toast("PDF procesado", "success");
  } catch (err) {
    toast("Error: " + err.message, "error");
  }
}

function copiarResultado() {
  navigator.clipboard.writeText(document.getElementById("res-mensaje").value)
    .then(() => toast("Copiado", "success"));
}

function whatsappResultado() {
  if (!_datos?.telefono) { toast("Sin telefono en los datos extraidos", "error"); return; }
  const msg = encodeURIComponent(document.getElementById("res-mensaje").value);
  const tel = _datos.telefono.replace(/\D/g, "");
  window.open(`https://wa.me/${tel}?text=${msg}`, "_blank");
}

async function emailResultado() {
  if (!_datos?.email) { toast("Sin email en los datos extraidos", "error"); return; }
  toast("Enviando...", "info");
  try {
    await post("/api/pdfs/enviar-email", { datos: _datos, mensaje: document.getElementById("res-mensaje").value });
    toast("Email enviado", "success");
  } catch (err) {
    toast("Error: " + err.message, "error");
  }
}
</script>
</body>
</html>
